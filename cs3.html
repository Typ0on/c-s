<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS 2 靶场 - 终极功能升级版</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; user-select: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background-color: rgba(0, 255, 0, 0.8); border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; pointer-events: none; }
        
        /* 左上角经典计时与击杀 UI */
        #ui-layer { position: absolute; top: 20px; left: 20px; color: #fff; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px #000; z-index: 10; pointer-events: none; }
        .ui-item { margin-bottom: 5px; }
        
        /* 🌟 右下角沙鹰子弹独立 UI */
        #ammo-layer { position: absolute; bottom: 30px; right: 40px; color: #ffbc00; font-size: 36px; font-weight: 900; font-family: monospace; text-shadow: 3px 3px 5px #000; z-index: 10; pointer-events: none; }
        #ammo-label { font-size: 14px; color: #fff; letter-spacing: 1px; display: block; text-align: right; margin-bottom: -5px; font-weight: normal; }

        #screen-overlay { position: absolute; width: 100%; height: 100%; background-color: rgba(0,0,0,0.88); display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; z-index: 20; cursor: pointer; text-align: center; }
        #screen-overlay h1 { font-size: 44px; margin: 0 0 10px 0; color: #ffbc00; }
        #screen-overlay p { font-size: 18px; margin: 0 0 20px 0; color: #bbb; white-space: pre-line; }
        #screen-overlay button { padding: 12px 35px; font-size: 18px; font-weight: bold; background-color: #ffbc00; border: none; border-radius: 5px; cursor: pointer; color: #000; transition: 0.2s; margin-top: 10px; }
        #screen-overlay button:hover { background-color: #fff; }

        /* 🌟 结算页排行榜专门区域 */
        #leaderboard-box { margin-top: 20px; background: rgba(255,255,255,0.06); padding: 15px 40px; border-radius: 8px; border: 1px solid rgba(255,188,0,0.2); display: none; text-align: left; min-width: 260px; }
        #leaderboard-box h3 { margin: 0 0 10px 0; text-align: center; color: #ffbc00; font-size: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .leader-item { display: flex; justify-content: space-between; font-size: 16px; margin-bottom: 4px; font-family: monospace; }
        .leader-item.top-run { color: #ffbc00; font-weight: bold; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="crosshair"></div>
    <div id="ui-layer">
        <div class="ui-item">⏱️ 时间: <span id="time-val">60</span>s</div>
        <div class="ui-item">🎯 击败: <span id="score-val">0</span></div>
    </div>

    <!-- 🌟 右下角子弹显示 -->
    <div id="ammo-layer">
        <span id="ammo-label">DESERT EAGLE</span>
        <span id="clip-val">7</span><span style="font-size:22px; color:#aaa;"> / ∞</span>
    </div>

    <div id="screen-overlay">
        <h1 id="title-text">CS 2 练枪靶场</h1>
        <p id="desc-text">资产完美绑定版！点击下方按钮直接开始！
【R键】手动装填弹夹</p>
        <button id="start-btn">开始挑战</button>
        
        <!-- 🌟 排行榜载体 -->
        <div id="leaderboard-box" id="leaderboard-box">
            <h3>🏆 靶场历史光荣榜</h3>
            <div id="leaderboard-list"></div>
        </div>
    </div>

    <script>
        let scene, camera, renderer;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let prevTime = performance.now();
        const velocity = new THREE.Vector3(), direction = new THREE.Vector3();
        
        let gameState = "MENU"; 
        let gameTimeLeft = 60;   
        let score = 0;
        let timerInterval;

        // 🌟 子弹与换弹控制变量
        let currentAmmo = 7;
        const maxAmmo = 7;
        let isReloading = false;

        const obstacles = [];
        const enemies = []; 

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(0, 0); 

        const gltfLoader = new THREE.GLTFLoader();
        
        // 🌟 严格对齐包含大写字母 P 的正确文件名
        const ENEMY_MODEL_URL = 'tr_Phoenix.glb';
        const GUN_MODEL_URL = 'gun.glb';
        const SOUND_SHOOT_URL = 'shoot.wav';
        const SOUND_DEATH_URL = 'death.wav';

        let playerGun = null;
        let audioListener, shootSound, deathSound, audioLoader;

        const overlay = document.getElementById('screen-overlay');
        const titleText = document.getElementById('title-text');
        const descText = document.getElementById('desc-text');
        const startBtn = document.getElementById('start-btn');
        const timeVal = document.getElementById('time-val');
        const scoreVal = document.getElementById('score-val');
        const clipVal = document.getElementById('clip-val');
        const leaderboardBox = document.getElementById('leaderboard-box');
        const leaderboardList = document.getElementById('leaderboard-list');

        startBtn.addEventListener('click', function() {
            document.body.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', function() {
            if (document.pointerLockElement === document.body) {
                overlay.style.display = 'none';
                leaderboardBox.style.display = 'none';
                if (THREE.AudioContext.getContext().state === 'suspended') {
                    THREE.AudioContext.getContext().resume();
                }
                if (gameState === "MENU" || gameState === "GAMEOVER") {
                    startGame();
                } else if (gameState === "PLAYING") {
                    resumeTimer();
                }
            } else {
                if (gameState === "PLAYING") {
                    clearInterval(timerInterval);
                    overlay.style.display = 'flex';
                    leaderboardBox.style.display = 'none';
                    titleText.innerText = "⏸️ 游戏已暂停";
                    descText.innerText = "当前击败数: " + score + " | 剩余时间: " + gameTimeLeft + "秒\n点击下方按钮继续战斗！";
                    startBtn.innerText = "恢复游戏";
                }
            }
        });

        function resumeTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(function() {
                gameTimeLeft--;
                timeVal.innerText = gameTimeLeft;
                if (gameTimeLeft <= 0) endGame();
            }, 1000);
        }

        document.addEventListener('mousemove', function(event) {
            if (document.pointerLockElement !== document.body || gameState !== "PLAYING") return;
            camera.rotation.y -= event.movementX * 0.002;
            camera.rotation.x -= event.movementY * 0.002;
            camera.rotation.x = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, camera.rotation.x));
        });

        document.addEventListener('mousedown', function(e) {
            if (document.pointerLockElement !== document.body || gameState !== "PLAYING") return;
            if (e.button === 0) shoot();
        });

        function startGame() {
            gameState = "PLAYING";
            gameTimeLeft = 60;
            score = 0;
            currentAmmo = 7; // 重置子弹
            clipVal.innerText = currentAmmo;
            clipVal.style.color = "#ffbc00";
            isReloading = false;
            timeVal.innerText = gameTimeLeft;
            scoreVal.innerText = score;
            camera.position.set(0, 1.6, 0);
            camera.rotation.set(0, 0, 0);
            clearEnemies();
            for (let i = 0; i < 5; i++) { spawnEnemy(); }
            resumeTimer();
        }

        // 🌟 核心增量：处理排行榜数据存储与展现
        function updateLeaderboard(newScore) {
            let scores = JSON.parse(localStorage.getItem('cs2_range_highscores')) || [];
            scores.push(newScore);
            scores.sort(function(a, b) { return b - a; });
            scores = scores.slice(0, 5); // 只保留前五名
            localStorage.setItem('cs2_range_highscores', JSON.stringify(scores));

            leaderboardList.innerHTML = "";
            for (let i = 0; i < 5; i++) {
                let s = scores[i] !== undefined ? scores[i] : 0;
                let item = document.createElement('div');
                item.className = "leader-item";
                if (s === newScore && newScore > 0) {
                    item.className += " top-run";
                    item.innerHTML = "<span>🏅 NO." + (i+1) + " (本次得分)</span><span>" + s + " 只</span>";
                } else {
                    item.innerHTML = "<span>   NO." + (i+1) + "</span><span>" + s + " 只</span>";
                }
                leaderboardList.appendChild(item);
            }
            leaderboardBox.style.display = 'block';
        }

        function endGame() {
            gameState = "GAMEOVER";
            clearInterval(timerInterval);
            document.exitPointerLock();
            overlay.style.display = 'flex';
            titleText.innerText = "⏱️ 时间到！挑战结束";
            descText.innerText = "你在 1 分钟内成功击倒了 " + score + " 个敌人！";
            startBtn.innerText = "再来一局";
            
            // 触发排行榜结算更新
            updateLeaderboard(score);
        }

        // 🌟 核心增量：手动换弹逻辑
        function reloadWeapon() {
            if (isReloading || currentAmmo === maxAmmo) return;
            isReloading = true;
            clipVal.innerText = "RELOAD";
            clipVal.style.color = "#ff3333";

            // 换弹动作动画：武器向下回缩切出视野再顶上来
            if (playerGun) {
                playerGun.position.y -= 0.3;
                playerGun.position.z += 0.1;
                setTimeout(function() {
                    if (playerGun) {
                        playerGun.position.y += 0.3;
                        playerGun.position.z -= 0.1;
                    }
                    currentAmmo = maxAmmo;
                    clipVal.innerText = currentAmmo;
                    clipVal.style.color = "#ffbc00";
                    isReloading = false;
                }, 1200); // 1.2 秒换弹延迟
            } else {
                setTimeout(function() {
                    currentAmmo = maxAmmo;
                    clipVal.innerText = currentAmmo;
                    clipVal.style.color = "#ffbc00";
                    isReloading = false;
                }, 1200);
            }
        }

        function shoot() {
            // 🌟 子弹判定：换弹中或没子弹时拦截开火
            if (isReloading) return;
            if (currentAmmo <= 0) {
                clipVal.innerText = "EMPTY";
                clipVal.style.color = "#ff3333";
                return; 
            }

            // 扣除子弹
            currentAmmo--;
            clipVal.innerText = currentAmmo;

            if (shootSound && shootSound.buffer) {
                if (shootSound.isPlaying) shootSound.stop(); 
                shootSound.play();
            }
            if (playerGun) {
                playerGun.position.z += 0.08; 
                playerGun.rotation.x += 0.1;  
                setTimeout(function() { 
                    if(playerGun) {
                        playerGun.position.z -= 0.08; 
                        playerGun.rotation.x -= 0.1;
                    }
                }, 60);
            }
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(enemies);
            if (intersects.length > 0) {
                if (deathSound && deathSound.buffer) {
                    if (deathSound.isPlaying) deathSound.stop();
                    deathSound.play();
                }
                const hitBox = intersects[0].object; 
                scene.remove(hitBox);
                const index = enemies.indexOf(hitBox);
                if (index > -1) enemies.splice(index, 1);
                score++;
                scoreVal.innerText = score;
                spawnEnemy();
            }
        }

        function clearEnemies() {
            for (let i = 0; i < enemies.length; i++) {
                scene.remove(enemies[i]);
            }
            enemies.length = 0;
        }

        function spawnEnemy() {
            if (obstacles.length === 0) return;
            const randomBox = obstacles[Math.floor(Math.random() * obstacles.length)];
            const offsetX = (Math.random() > 0.5 ? 1 : -1) * (2 + Math.random() * 2);
            const offsetZ = (Math.random() > 0.5 ? 1 : -1) * (2 + Math.random() * 2);
            const posX = Math.max(-23, Math.min(23, randomBox.position.x + offsetX));
            const posZ = Math.max(-23, Math.min(23, randomBox.position.z + offsetZ));

            // 圆柱体半径为 0.6 宽容判定，且彻底隐形（visible: false）
            const hitboxGeo = new THREE.CylinderGeometry(0.6, 0.6, 2.2, 8); 
            const hitboxMat = new THREE.MeshBasicMaterial({ color: 0xff0000, visible: false }); 
            const hitbox = new THREE.Mesh(hitboxGeo, hitboxMat);
            hitbox.position.set(posX, 1.1, posZ); 

            gltfLoader.load(ENEMY_MODEL_URL, function (gltf) {
                const realModel = gltf.scene;
                
                realModel.position.set(0, -0.8, 0); 
                
                // 🌟 完美缩放绑定 0.03 比例
                realModel.scale.set(0.03, 0.03, 0.03); 
                
                hitbox.add(realModel);
                scene.add(hitbox);
                enemies.push(hitbox);
            }, undefined, function (e) { console.error("人物模型载入失败:", e); });
        }

        function loadPlayerGun() {
            gltfLoader.load(GUN_MODEL_URL, function (gltf) {
                playerGun = gltf.scene;
                playerGun.position.set(0.25, -0.25, -0.5); 
                playerGun.scale.set(1.0, 1.0, 1.0); 
                playerGun.rotation.set(0, Math.PI, 0); 
                camera.add(playerGun);
                scene.add(camera); 
                console.log("武器模型载入成功！");
            }, undefined, function (e) { console.error("武器模型载入失败:", e); });
        }

        function initSounds() {
            audioListener = new THREE.AudioListener();
            camera.add(audioListener);
            shootSound = new THREE.Audio(audioListener);
            deathSound = new THREE.Audio(audioListener);
            audioLoader = new THREE.AudioLoader();

            audioLoader.load(SOUND_SHOOT_URL, function (buffer) {
                shootSound.setBuffer(buffer);
                shootSound.setVolume(0.4); 
            }, undefined, function(err){ console.log("射击音效加载失败"); });
            
            audioLoader.load(SOUND_DEATH_URL, function (buffer) {
                deathSound.setBuffer(buffer);
                deathSound.setVolume(0.5); 
            }, undefined, function(err){ console.log("死亡音效加载失败"); });
        }

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xddccbb); 
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';

            loadPlayerGun();
            initSounds();

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.9);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            const floorGeo = new THREE.PlaneGeometry(50, 50);
            const floorMat = new THREE.MeshBasicMaterial({ color: 0x8a7355 }); 
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            const wallMat = new THREE.MeshBasicMaterial({ color: 0x6e5d47 });
            const wallGeo = new THREE.BoxGeometry(50, 4, 1);
            const wallN = new THREE.Mesh(wallGeo, wallMat); wallN.position.set(0, 2, -25); scene.add(wallN);
            const wallS = new THREE.Mesh(wallGeo, wallMat); wallS.position.set(0, 2, 25); scene.add(wallS);
            const wallGeoRot = new THREE.BoxGeometry(1, 4, 50);
            const wallE = new THREE.Mesh(wallGeoRot, wallMat); wallE.position.set(25, 2, 0); scene.add(wallE);
            const wallW = new THREE.Mesh(wallGeoRot, wallMat); wallW.position.set(-25, 2, 0); scene.add(wallW);

            const boxGeo = new THREE.BoxGeometry(2.5, 2.5, 2.5);
            const boxMat = new THREE.MeshBasicMaterial({ color: 0x5c4033 }); 
            const boxPositions = [
                [-10, -10], [10, -10], [-12, 8], [14, 5],
                [-5, 15], [5, -18], [12, 12], [-15, -2]
            ];
            for (let i = 0; i < boxPositions.length; i++) {
                const pos = boxPositions[i];
                const box = new THREE.Mesh(boxGeo, boxMat);
                box.position.set(pos[0], 1.25, pos[1]);
                scene.add(box);
                obstacles.push(box); 
            }

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const onKeyDown = function(e) {
                if(gameState !== "PLAYING") return;
                switch (e.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyD': moveRight = true; break;
                    // 🌟 监听键盘 R 键触发手动装弹
                    case 'KeyR': reloadWeapon(); break;
                }
            };
            const onKeyUp = function(e) {
                switch (e.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyD': moveRight = false; break;
                }
            };
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (document.pointerLockElement === document.body && gameState === "PLAYING") {
                const time = performance.now();
                const delta = (time - prevTime) / 1000;
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();
                if (moveForward || moveBackward) velocity.z -= direction.z * 40.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 40.0 * delta;
                const camYaw = new THREE.Vector3();
                camera.getWorldDirection(camYaw);
                camYaw.y = 0;
                camYaw.normalize();
                const camRight = new THREE.Vector3();
                camRight.crossVectors(camYaw, camera.up).negate();
                camera.position.addScaledVector(camYaw, -velocity.z * delta);
                camera.position.addScaledVector(camRight, velocity.x * delta);
                camera.position.x = Math.max(-24, Math.min(24, camera.position.x));
                camera.position.z = Math.max(-24, Math.min(24, camera.position.z));
            }
            prevTime = performance.now();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
